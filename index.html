
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ระบบคำนวนมูลค่าโครงการ บริษัท นูแมพ จำกัด</title>
<style>
:root {
  --green: #2E7D32;
  --green-light: #43A047;
  --green-pale: #E8F5E9;
  --orange: #F57C00;
  --orange-light: #FF9800;
  --orange-pale: #FFF3E0;
  --bg: #f0f4f0;
  --card: #ffffff;
  --text: #263238;
  --text-muted: #607D8B;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 0 0 40px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 640px; margin: 0 auto; padding: 0 16px; }

.header {
  background: linear-gradient(135deg, var(--green) 0%, var(--orange) 100%);
  color: #fff;
  padding: 28px 20px 22px;
  text-align: center;
  margin-bottom: 18px;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
.header .sub { font-size: 13px; opacity: .85; margin-top: 4px; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 14px; font-weight: 700;
  padding-bottom: 0;
  display: flex; align-items: center; gap: 8px;
}
.card-title .icon { font-size: 17px; }
.card-title .title-text { flex: 1; }

.toggle-btn {
  background: var(--green-pale); border: 1px solid #C8E6C9;
  padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--green); white-space: nowrap;
  transition: background .15s;
}
.toggle-btn:hover { background: #C8E6C9; }
.toggle-btn.orange { background: var(--orange-pale); color: var(--orange); border-color: #FFE0B2; }
.toggle-btn.orange:hover { background: #FFE0B2; }

.card-divider { height: 1px; background: var(--green-pale); margin: 10px 0; }

.row { display: flex; gap: 10px; flex-wrap: wrap; }
.field { flex: 1; min-width: calc(50% - 5px); }
@media (min-width: 480px) { .field { min-width: calc(25% - 8px); } }
.field label {
  display: block; font-size: 12px; color: var(--text-muted);
  margin-bottom: 3px; font-weight: 500;
}
.field input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid #DDE4E8; border-radius: 8px;
  font-size: 16px; font-weight: 600; color: var(--text);
  outline: none; background: #FAFBFC;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--green-light);
  box-shadow: 0 0 0 3px rgba(67,160,71,.15);
  background: #fff;
}

.section-content { display: none; }
.section-content.open { display: block; }

.item-list { display: flex; flex-direction: column; gap: 2px; }

.item-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 8px; border-radius: 8px;
  transition: background .15s;
}
.item-row:hover { background: #f8faf8; }
.item-row .cb { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.item-row .info { flex: 1; min-width: 0; }
.item-row .name { font-size: 14px; font-weight: 500; user-select: none; }
.item-row .detail { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #E0E8E0; }
.item-row .detail.show { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.item-row .detail label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.item-row .detail input {
  padding: 6px 8px; border: 1.5px solid #DDE4E8; border-radius: 6px;
  font-size: 13px; outline: none; background: #FAFBFC;
}
.item-row .detail input:focus {
  border-color: var(--orange-light); box-shadow: 0 0 0 3px rgba(255,152,0,.12);
}
.item-row .detail .name-input { width: 100%; margin-bottom: 4px; font-weight: 500; }
.item-row .detail .price-input { width: 90px; text-align: right; font-weight: 600; }
.item-row .detail .unit-input { width: 120px; }
.item-row .detail .qty-input { width: 70px; text-align: center; }
.item-row .detail .formula-label { font-size: 11px; color: var(--text-muted); font-style: italic; }

.btn-icon {
  background: none; border: none; cursor: pointer; padding: 4px 6px;
  border-radius: 6px; color: var(--text-muted); font-size: 16px; line-height: 1;
  transition: background .15s, color .15s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--green-pale); color: var(--green); }
.btn-icon.danger:hover { background: #FFEBEE; color: #C62828; }

.btn-add {
  background: var(--green-pale); color: var(--green); border: 1px solid #C8E6C9;
  padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: background .15s;
  display: inline-flex; align-items: center; gap: 4px; width: 100%;
  justify-content: center;
}
.btn-add:hover { background: #C8E6C9; }
.btn-add.orange { background: var(--orange-pale); color: var(--orange); border-color: #FFE0B2; }
.btn-add.orange:hover { background: #FFE0B2; }

.total-card {
  background: linear-gradient(135deg, var(--green) 0%, #1B5E20 50%, var(--orange) 100%);
  color: #fff; text-align: center; padding: 28px 20px;
}
.total-card .label { font-size: 14px; opacity: .85; font-weight: 500; }
.total-card .value {
  font-size: 38px; font-weight: 800; letter-spacing: 1px;
  margin-top: 6px; text-shadow: 0 2px 4px rgba(0,0,0,.15);
  word-break: break-word;
}
.total-card .breakdown {
  margin-top: 10px; font-size: 12px; opacity: .75;
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
}
.total-card .breakdown span { display: inline-flex; align-items: center; gap: 3px; }
.total-card .multiplier-badge {
  display: inline-block; background: rgba(255,255,255,.15); padding: 1px 8px;
  border-radius: 10px; font-size: 11px; font-weight: 600;
}

.empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>ระบบคำนวนมูลค่าโครงการ</h1>
  <div class="sub">บริษัท นูแมพ จำกัด</div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">
      <span class="icon">&#128196;</span>
      <span class="title-text">ข้อมูลพื้นฐาน</span>
    </div>
    <div class="card-divider"></div>
    <div class="row">
      <div class="field"><label>แปลงที่ดิน</label><input type="text" inputmode="numeric" id="input-land" class="num-input" data-raw="10000" value="10,000" onfocus="clearOnFocus(this)" oninput="onNumInput(this);calc()"></div>
      <div class="field"><label>อาคาร</label><input type="text" inputmode="numeric" id="input-bldg" class="num-input" data-raw="8000" value="8,000" onfocus="clearOnFocus(this)" oninput="onNumInput(this);calc()"></div>
      <div class="field"><label>ป้าย</label><input type="text" inputmode="numeric" id="input-sign" class="num-input" data-raw="2000" value="2,000" onfocus="clearOnFocus(this)" oninput="onNumInput(this);calc()"></div>
      <div class="field"><label>พื้นที่ (ตร.กม.)</label><input type="text" inputmode="decimal" id="input-area" class="num-input-dec" data-raw="30" value="30" onfocus="clearOnFocus(this)" oninput="onNumInputDec(this);calc()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="icon">&#128221;</span>
      <span class="title-text">กิจกรรมที่ต้องดำเนินการ</span>
      <button class="toggle-btn" onclick="toggleActSection()" id="actToggleBtn">แสดงรายละเอียด</button>
    </div>
    <div class="card-divider"></div>
    <div class="section-content" id="actSectionContent">
      <div class="item-list" id="activityList"></div>
      <button class="btn-add" onclick="addActivity()">+ เพิ่มกิจกรรม</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="icon">&#128187;</span>
      <span class="title-text">อุปกรณ์คอมพิวเตอร์</span>
      <button class="toggle-btn orange" onclick="toggleEqSection()" id="eqToggleBtn">แสดงรายละเอียด</button>
    </div>
    <div class="card-divider"></div>
    <div class="section-content" id="eqSectionContent">
      <div class="item-list" id="equipList"></div>
      <button class="btn-add orange" onclick="addEquip()">+ เพิ่มอุปกรณ์</button>
    </div>
  </div>

  <div class="card total-card">
    <div class="label">มูลค่าโครงการทั้งสิ้น</div>
    <div class="value" id="totalDisplay">0 บาท</div>
    <div class="breakdown" id="breakdown"></div>
  </div>

</div>

<script>
// ===== DATA =====
const ACT_DEFAULTS = [
  { name: 'จัดหาโฉนด และเอกสารสิทธิ์',   price: 150,   unit: 'บาท/แปลง',    qtyLabel: 'จำนวนแปลงที่ดิน',          qtyFn: v => v.land },
  { name: 'ภาพถ่ายโดรน',                 price: 15000, unit: 'บาท/ตร.กม.',  qtyLabel: 'ขนาดพื้นที่',               qtyFn: v => v.area },
  { name: 'ภาพถ่ายดาวเทียม',             price: 500,   unit: 'บาท/ตร.กม.',  qtyLabel: 'ขนาดพื้นที่',               qtyFn: v => v.area },
  { name: 'งานจัดทำแผนที่แม่บท',         price: 120,   unit: 'บาท/Block',   qtyLabel: 'Block (พื้นที่÷2×15)',      qtyFn: v => (v.area / 2) * 15 },
  { name: 'งานสำรวจและนำเข้าข้อมูล',     price: 149,   unit: 'บาท/รายการ',  qtyLabel: 'แปลงที่ดิน + อาคาร + ป้าย', qtyFn: v => v.land + v.building + v.sign },
  { name: 'งานพิมพ์แบบ ภ.ด.ส. 1-4',     price: 5,     unit: 'บาท/รายการ',  qtyLabel: 'จำนวนแปลงที่ดิน',          qtyFn: v => v.land },
];

let activities = [];
let equipments = [];
let actId = 100;
let eqId = 100;
let showActSection = false;
let showEqSection = false;

function init() {
  activities = ACT_DEFAULTS.map((a, i) => ({
    id: i, name: a.name, price: a.price, unit: a.unit,
    qtyLabel: a.qtyLabel, qtyFn: a.qtyFn,
    checked: i === 1 ? false : true,
    editOpen: false, isDefault: true,
  }));
  equipments = [
    { id: 0,  name: 'เครื่องคอมพิวเตอร์แม่ข่าย แบบที่ 2',                                        price: 620000, qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 1,  name: 'เครื่องคอมพิวเตอร์สำหรับงานประมวลผล แบบที่ 2',                             price: 36000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 2,  name: 'เครื่องคอมพิวเตอร์ All In One สำหรับงานประมวลผล',                           price: 26000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 3,  name: 'เครื่องคอมพิวเตอร์โน้ตบุ๊ก สำหรับงานประมวลผล',                              price: 25000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 4,  name: 'เครื่องคอมพิวเตอร์โน้ตบุ๊ก สำหรับงานปัญญาประดิษฐ์',                          price: 35000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 5,  name: 'อุปกรณ์ป้องกันเครือข่าย (Next Generation Firewall) แบบที่ 1',                 price: 220000, qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 6,  name: 'อุปกรณ์กระจายสัญญาณ (L2 Switch) ขนาด 24 ช่อง แบบที่ 2',                     price: 13000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 7,  name: 'เครื่องพิมพ์เลเซอร์ หรือ LED ขาวดำ ชนิด Network แบบที่ 2',                    price: 16000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 8,  name: 'เครื่องสำรองไฟฟ้า ขนาด 1.5 kVA',                                           price: 6000,   qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 9,  name: 'เครื่องสำรองไฟฟ้า ขนาด 3 kVA',                                             price: 29000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 10, name: 'ค่าเช่าบริการระบบ Cloud Server แบบที่ 2',                                   price: 13000,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 11, name: 'ชุดโปรแกรมระบบปฏิบัติการสำหรับเครื่องคอมพิวเตอร์ฯ (OEM)',                     price: 5500,   qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 12, name: 'ชุดโปรแกรมระบบปฏิบัติการสำหรับเครื่องคอมพิวเตอร์แม่ข่าย (Server)',              price: 45500,  qty: 1, checked: false, editOpen: false, isDefault: true },
    { id: 13, name: 'ชุดโปรแกรมจัดการสำนักงาน แบบที่ 1',                                         price: 18500,  qty: 1, checked: false, editOpen: false, isDefault: true },
  ];
  calc();
}

// ===== INPUT HELPERS =====
function clearOnFocus(el) {
  el.value = '';
  el.setAttribute('data-raw', '');
}

function onNumInput(el) {
  let raw = el.value.replace(/[^0-9]/g, '');
  if (raw === '' || raw === '0') { raw = '0'; el.value = '0'; }
  else { el.value = parseInt(raw, 10).toLocaleString('en-US'); }
  el.setAttribute('data-raw', raw);
}
function onNumInputDec(el) {
  let raw = el.value.replace(/[^0-9.]/g, '');
  const dots = raw.match(/\./g);
  if (dots && dots.length > 1) raw = raw.slice(0, raw.lastIndexOf('.'));
  if (raw === '' || raw === '0') { raw = '0'; el.value = '0'; }
  else {
    const parts = raw.split('.');
    parts[0] = parts[0] ? parseInt(parts[0], 10).toLocaleString('en-US') : '0';
    el.value = parts.join('.');
    raw = raw.split('.')[0] + (raw.includes('.') ? '.' + (raw.split('.')[1] || '') : '');
  }
  el.setAttribute('data-raw', raw);
}

function getVals() {
  return {
    land: parseFloat(document.getElementById('input-land')?.getAttribute('data-raw')) || 0,
    building: parseFloat(document.getElementById('input-bldg')?.getAttribute('data-raw')) || 0,
    sign: parseFloat(document.getElementById('input-sign')?.getAttribute('data-raw')) || 0,
    area: parseFloat(document.getElementById('input-area')?.getAttribute('data-raw')) || 0,
  };
}

// ===== SECTION TOGGLE =====
function toggleActSection() {
  showActSection = !showActSection;
  const content = document.getElementById('actSectionContent');
  const btn = document.getElementById('actToggleBtn');
  content.classList.toggle('open', showActSection);
  btn.textContent = showActSection ? 'ซ่อนรายละเอียด' : 'แสดงรายละเอียด';
  if (showActSection) renderActivities();
}
function toggleEqSection() {
  showEqSection = !showEqSection;
  const content = document.getElementById('eqSectionContent');
  const btn = document.getElementById('eqToggleBtn');
  content.classList.toggle('open', showEqSection);
  btn.textContent = showEqSection ? 'ซ่อนรายละเอียด' : 'แสดงรายละเอียด';
  if (showEqSection) renderEquips();
}

// ===== RENDER =====
function renderActivities() {
  const container = document.getElementById('activityList');
  container.innerHTML = '';
  if (activities.length === 0) {
    container.innerHTML = '<div class="empty-state">ยังไม่มีรายการกิจกรรม</div>';
    return;
  }
  activities.forEach((act, idx) => {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <input type="checkbox" class="cb" ${act.checked ? 'checked' : ''} onchange="toggleAct(${idx}, this.checked)">
      <div class="info">
        <div class="detail ${act.editOpen ? 'show' : ''}">
          <input type="text" class="name-input" value="${escHtml(act.name)}" oninput="updateActName(${idx}, this)" placeholder="ชื่อกิจกรรม">
        </div>
        <span class="name" ${act.editOpen ? 'style="display:none"' : ''}>${escHtml(act.name)}</span>
        <div class="detail ${act.editOpen ? 'show' : ''}">
          <label>ราคา</label>
          <input type="text" inputmode="numeric" class="price-input" data-raw="${act.price}" value="${fmtNum(act.price)}" oninput="onNumInput(this);updateActPrice(${idx}, this)">
          <label>ต่อ</label>
          <input type="text" class="unit-input" value="${escHtml(act.unit)}" oninput="updateActUnit(${idx}, this)" placeholder="หน่วย">
          ${act.isDefault ? `<span class="formula-label">&#9432; ${escHtml(act.qtyLabel)}</span>` : ''}
          ${!act.isDefault ? `
            <label>จำนวน</label>
            <input type="text" inputmode="numeric" class="qty-input" data-raw="${act.customQty || 1}" value="${fmtNum(act.customQty || 1)}" oninput="onNumInput(this);updateActQty(${idx}, this)">
          ` : ''}
        </div>
      </div>
      <button class="btn-icon" onclick="toggleActEdit(${idx})" title="แก้ไข">&#9998;</button>
      ${!act.isDefault ? `<button class="btn-icon danger" onclick="removeAct(${idx})" title="ลบ">&times;</button>` : ''}
    `;
    container.appendChild(div);
  });
}

function renderEquips() {
  const container = document.getElementById('equipList');
  container.innerHTML = '';
  if (equipments.length === 0) {
    container.innerHTML = '<div class="empty-state">ยังไม่มีรายการอุปกรณ์</div>';
    return;
  }
  equipments.forEach((eq, idx) => {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <input type="checkbox" class="cb" ${eq.checked ? 'checked' : ''} onchange="toggleEq(${idx}, this.checked)">
      <div class="info">
        <div class="detail ${eq.editOpen ? 'show' : ''}">
          <input type="text" class="name-input" value="${escHtml(eq.name)}" oninput="updateEqName(${idx}, this)" placeholder="ชื่ออุปกรณ์">
        </div>
        <span class="name" ${eq.editOpen ? 'style="display:none"' : ''}>${escHtml(eq.name)}</span>
        <div class="detail ${eq.editOpen ? 'show' : ''}">
          <label>ราคา</label>
          <input type="text" inputmode="numeric" class="price-input" data-raw="${eq.price}" value="${fmtNum(eq.price)}" oninput="onNumInput(this);updateEqPrice(${idx}, this)">
          <label>จำนวน</label>
          <input type="text" inputmode="numeric" class="qty-input" data-raw="${eq.qty}" value="${fmtNum(eq.qty)}" oninput="onNumInput(this);updateEqQty(${idx}, this)">
          <span style="font-size:11px;color:var(--text-muted)">เครื่อง</span>
        </div>
      </div>
      <button class="btn-icon" onclick="toggleEqEdit(${idx})" title="แก้ไข">&#9998;</button>
      ${!eq.isDefault ? `<button class="btn-icon danger" onclick="removeEq(${idx})" title="ลบ">&times;</button>` : ''}
    `;
    container.appendChild(div);
  });
}

function renderTotal() {
  const v = getVals();

  let actRawTotal = 0;
  activities.forEach(act => {
    if (!act.checked) return;
    const qty = act.isDefault ? act.qtyFn(v) : (act.customQty || 0);
    actRawTotal += qty * act.price;
  });

  const multiplier = v.land >= 40000 ? 1.01 : 1.15;
  const actTotal = actRawTotal * multiplier;

  let eqTotal = 0;
  equipments.forEach(eq => {
    if (!eq.checked) return;
    eqTotal += eq.price * eq.qty;
  });

  const total = actTotal + eqTotal;
  document.getElementById('totalDisplay').textContent = fmt(total) + ' บาท';

  const bd = document.getElementById('breakdown');
  const pts = [];
  if (actRawTotal > 0) {
    pts.push('<span>กิจกรรม: ' + fmt(actRawTotal) + ' <span class="multiplier-badge">×' + multiplier.toFixed(2) + '</span> = ' + fmt(actTotal) + ' บาท</span>');
  }
  if (eqTotal > 0) {
    pts.push('<span>อุปกรณ์: ' + fmt(eqTotal) + ' บาท</span>');
  }
  if (pts.length === 0) {
    pts.push('<span>กรุณาเลือกกิจกรรมหรืออุปกรณ์</span>');
  }
  bd.innerHTML = pts.join(' | ');
}

function calc() { renderTotal(); }

// ===== ACTIVITIES =====
function toggleAct(idx, val) { activities[idx].checked = val; calc(); }
function toggleActEdit(idx) {
  activities[idx].editOpen = !activities[idx].editOpen;
  if (showActSection) renderActivities();
}
function updateActName(idx, el) { activities[idx].name = el.value; calc(); }
function updateActPrice(idx, el) { activities[idx].price = parseFloat(el.getAttribute('data-raw')) || 0; calc(); }
function updateActUnit(idx, el) { activities[idx].unit = el.value; calc(); }
function updateActQty(idx, el) { activities[idx].customQty = parseFloat(el.getAttribute('data-raw')) || 0; calc(); }
function removeAct(idx) {
  if (!activities[idx].isDefault) { activities.splice(idx, 1); if (showActSection) renderActivities(); calc(); }
}
function addActivity() {
  activities.push({
    id: actId++, name: 'กิจกรรมใหม่', price: 0, unit: 'บาท/หน่วย',
    qtyLabel: '', qtyFn: null, customQty: 1,
    checked: false, editOpen: true, isDefault: false,
  });
  if (showActSection) renderActivities();
  calc();
}

// ===== EQUIPMENT =====
function toggleEq(idx, val) { equipments[idx].checked = val; calc(); }
function toggleEqEdit(idx) {
  equipments[idx].editOpen = !equipments[idx].editOpen;
  if (showEqSection) renderEquips();
}
function updateEqName(idx, el) { equipments[idx].name = el.value; calc(); }
function updateEqPrice(idx, el) { equipments[idx].price = parseFloat(el.getAttribute('data-raw')) || 0; calc(); }
function updateEqQty(idx, el) { equipments[idx].qty = parseFloat(el.getAttribute('data-raw')) || 0; calc(); }
function removeEq(idx) {
  if (!equipments[idx].isDefault) { equipments.splice(idx, 1); if (showEqSection) renderEquips(); calc(); }
}
function addEquip() {
  equipments.push({
    id: eqId++, name: 'อุปกรณ์ใหม่', price: 0, qty: 1, checked: true,
    editOpen: true, isDefault: false,
  });
  if (showEqSection) renderEquips();
  calc();
}

// ===== UTILITIES =====
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(n) { return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
function fmtNum(n) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

init();
</script>
</body>
